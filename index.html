<!DOCTYPE html>
<html>
<head>
  <title>HireSmart AI</title>

  <script src="https://cdn.tailwindcss.com"></script>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

  <!-- PDF reader library -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

</head>

<body class="bg-slate-100">

<div id="root"></div>

<script>

const { useState } = React;

function App() {

  const [resumeText, setResumeText] = useState("");
  const [jobDescription, setJobDescription] = useState("");
  const [result, setResult] = useState("");
  const [loading, setLoading] = useState(false);

  // Extract text from PDF
  const extractPDFText = async (file) => {

    const reader = new FileReader();

    reader.onload = async function() {

      const typedarray = new Uint8Array(reader.result);

      const pdf = await pdfjsLib.getDocument(typedarray).promise;

      let text = "";

      for (let i = 1; i <= pdf.numPages; i++) {

        const page = await pdf.getPage(i);

        const content = await page.getTextContent();

        const strings = content.items.map(item => item.str);

        text += strings.join(" ") + "\n";

      }

      setResumeText(text);

      alert("Resume loaded successfully");

    };

    reader.readAsArrayBuffer(file);

  };


  const handleFileUpload = (event) => {

    const file = event.target.files[0];

    if (file) {

      extractPDFText(file);

    }

  };


  const analyzeCandidate = async () => {

    if (!resumeText || !jobDescription) {

      alert("Please upload resume and enter job description");

      return;

    }

    setLoading(true);

    setResult("Analyzing...");

    try {

      const response = await fetch("https://agentic-aii.onrender.com/evaluate", {

        method: "POST",

        headers: {
          "Content-Type": "application/json"
        },

        body: JSON.stringify({
          resume: resumeText,
          job_description: jobDescription
        })

      });

      const data = await response.json();

      setResult(data.evaluation);

    }
    catch(error) {

      setResult("Error connecting to backend");

    }

    setLoading(false);

  };


  return (

    React.createElement(
      "div",
      { className: "min-h-screen p-8" },

      React.createElement(
        "div",
        { className: "max-w-4xl mx-auto bg-white p-6 rounded-xl shadow" },

        React.createElement(
          "h1",
          { className: "text-3xl font-bold text-blue-600 mb-4" },
          "HireSmart AI - Hiring Assistant"
        ),

        // Resume Upload
        React.createElement("input", {
          type: "file",
          accept: ".pdf",
          onChange: handleFileUpload,
          className: "mb-4"
        }),

        // OR paste resume text
        React.createElement("textarea", {
          placeholder: "OR paste resume text here...",
          className: "w-full border p-3 rounded mb-4",
          rows: 5,
          onChange: (e) => setResumeText(e.target.value)
        }),

        // Job description
        React.createElement("textarea", {
          placeholder: "Paste Job Description here...",
          className: "w-full border p-3 rounded mb-4",
          rows: 5,
          onChange: (e) => setJobDescription(e.target.value)
        }),

        React.createElement(
          "button",
          {
            className: "bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700",
            onClick: analyzeCandidate
          },
          loading ? "Analyzing..." : "Analyze Candidate"
        ),

        React.createElement(
          "div",
          { className: "mt-6 p-4 bg-gray-100 rounded min-h-[120px]" },

          React.createElement("pre", null, result || "Result will appear here...")

        )

      )

    )

  );

}

ReactDOM.render(

  React.createElement(App),

  document.getElementById("root")

);

</script>

</body>
</html>
