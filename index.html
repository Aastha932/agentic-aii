<!DOCTYPE html>
<html>
<head>
  <title>Hiring Manager AI Agent</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
</head>

<body class="bg-gray-100">

<div id="root"></div>

<script>

const { useState } = React;

function App() {

  const [resume, setResume] = useState("");
  const [jd, setJd] = useState("");
  const [result, setResult] = useState("");
  const [loading, setLoading] = useState(false);

  const analyze = async () => {

    if (!resume || !jd) {
      alert("Please enter both Resume and Job Description");
      return;
    }

    setLoading(true);
    setResult("Analyzing candidate...");

    try {

      const response = await fetch("https://bionomic-claval-odilia.ngrok-free.dev/", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          resume: resume,
          job_description: jd
        })
      });

      const data = await response.json();
      setResult(data.evaluation);

    } catch (error) {
      console.error(error);
      setResult("Error connecting to backend.");
    }

    setLoading(false);
  };

  return (
    React.createElement("div", { className: "max-w-4xl mx-auto mt-10 bg-white p-6 rounded shadow" },

      React.createElement("h1", { className: "text-3xl font-bold mb-6 text-blue-600" },
        "Hiring Manager AI Agent 🚀"
      ),

      React.createElement("textarea", {
        placeholder: "Paste Resume here...",
        rows: 6,
        className: "w-full border p-3 mb-4 rounded",
        onChange: (e) => setResume(e.target.value)
      }),

      React.createElement("textarea", {
        placeholder: "Paste Job Description here...",
        rows: 6,
        className: "w-full border p-3 mb-4 rounded",
        onChange: (e) => setJd(e.target.value)
      }),

      React.createElement("button", {
        onClick: analyze,
        className: "bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700"
      }, loading ? "Analyzing..." : "Analyze Candidate"),

      React.createElement("div", {
        className: "mt-6 p-4 bg-gray-100 rounded min-h-[150px] whitespace-pre-wrap"
      },
        result || "Result will appear here..."
      )
    )
  );
}

ReactDOM.render(
  React.createElement(App),
  document.getElementById("root")
);

</script>

</body>
</html>
