<!DOCTYPE html>
<html>
<head>
  <title>HireSmart AI</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- React -->
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

</head>

<body class="bg-slate-100">

<div id="root"></div>

<script type="text/javascript">

const { useState } = React;

function App() {

  const [resume, setResume] = useState("");
  const [jobDescription, setJobDescription] = useState("");
  const [result, setResult] = useState("");
  const [loading, setLoading] = useState(false);

  const analyzeCandidate = async () => {

    if (!resume || !jobDescription) {
      alert("Please fill both fields");
      return;
    }

    setLoading(true);
    setResult("");

    try {

      const response = await fetch("https://agentic-aii.onrender.com/evaluate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({
          resume: resume,
          job_description: jobDescription
        })
      });

      const data = await response.json();

      setResult(data.evaluation);

    } catch (error) {

      setResult("Error connecting to AI backend");

    }

    setLoading(false);

  };


  return React.createElement(
    "div",
    { className: "min-h-screen p-8" },

    React.createElement(
      "div",
      { className: "max-w-4xl mx-auto bg-white p-6 rounded-xl shadow-md" },

      React.createElement(
        "h1",
        { className: "text-3xl font-bold text-blue-600 mb-4" },
        "HireSmart AI - Hiring Assistant"
      ),

      React.createElement(
        "textarea",
        {
          placeholder: "Paste Resume here...",
          className: "w-full border p-3 rounded mb-4",
          rows: 6,
          value: resume,
          onChange: (e) => setResume(e.target.value)
        }
      ),

      React.createElement(
        "textarea",
        {
          placeholder: "Paste Job Description here...",
          className: "w-full border p-3 rounded mb-4",
          rows: 6,
          value: jobDescription,
          onChange: (e) => setJobDescription(e.target.value)
        }
      ),

      React.createElement(
        "button",
        {
          className: "bg-blue-600 text-white px-6 py-3 rounded hover:bg-blue-700",
          onClick: analyzeCandidate
        },
        loading ? "Analyzing..." : "Analyze Candidate"
      ),

      React.createElement(
        "div",
        { className: "mt-6 p-4 bg-gray-100 rounded min-h-[100px]" },

        result
          ? React.createElement("pre", null, result)
          : "Result will appear here..."

      )

    )

  );

}

ReactDOM.render(
  React.createElement(App),
  document.getElementById("root")
);

</script>

</body>
</html>
